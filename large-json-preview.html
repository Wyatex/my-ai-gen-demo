<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>超大 JSON 可视化 (虚拟列表+搜索版)</title>
    <style>
      :root {
        --bg-color: #1e1e1e;
        --panel-bg: #252526;
        --text-color: #d4d4d4;
        --key-color: #9cdcfe;
        --string-color: #ce9178;
        --number-color: #b5cea8;
        --boolean-color: #569cd6;
        --null-color: #c586c0;
        --hover-bg: #2a2d2e;
        --border-color: #444;
        --btn-bg: #0e639c;
        --btn-hover: #1177bb;
        --highlight-bg: #613214; /* 搜索命中的背景色 */
      }

      body {
        margin: 0;
        padding: 20px;
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: Consolas, 'Courier New', monospace;
        height: 100vh;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .control-panel {
        display: flex;
        background-color: var(--panel-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        margin-bottom: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        flex-shrink: 0;
      }

      .panel-section {
        flex: 1;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .divider {
        width: 1px;
        background-color: var(--border-color);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .divider span {
        background-color: var(--panel-bg);
        padding: 10px 0;
        color: #888;
        font-size: 11px;
      }

      /* 搜索框样式 */
      .search-container {
        padding: 10px;
        background-color: var(--panel-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .search-input {
        flex: 1;
        background: var(--bg-color);
        border: 1px solid var(--border-color);
        color: var(--text-color);
        padding: 8px 12px;
        border-radius: 4px;
        outline: none;
      }

      .search-input:focus {
        border-color: var(--btn-bg);
      }

      .btn {
        background-color: var(--btn-bg);
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        transition: background-color 0.2s;
      }

      .btn:hover {
        background-color: var(--btn-hover);
      }

      textarea {
        height: 40px;
        background-color: var(--bg-color);
        color: var(--text-color);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 8px;
        font-family: inherit;
        resize: none;
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none; /* IE/Edge */
      }
      textarea::-webkit-scrollbar {
        display: none; /* Chrome/Safari/Webkit */
      }

      #loading {
        color: #ffcc00;
        margin-bottom: 5px;
        font-size: 14px;
        display: none;
      }

      /* 虚拟列表 */
      #viewport {
        flex: 1;
        overflow-y: auto;
        position: relative;
        border: 1px solid var(--border-color);
        background: #1e1e1e;
      }

      #content {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
      }

      .tree-row {
        height: 24px;
        line-height: 24px;
        display: flex;
        align-items: center;
        cursor: pointer;
        white-space: nowrap;
        user-select: text;
      }

      .tree-row:hover {
        background-color: var(--hover-bg);
      }
      .tree-row.matched {
        background-color: var(--highlight-bg);
      }

      .toggle-icon {
        display: inline-block;
        width: 20px;
        text-align: center;
        color: #888;
        font-size: 10px;
      }

      .toggle-icon.expanded {
        transform: rotate(90deg);
      }
      .toggle-icon.empty {
        visibility: hidden;
      }

      .json-key {
        color: var(--key-color);
      }
      .json-string {
        color: var(--string-color);
      }
      .json-number {
        color: var(--number-color);
      }
      .json-boolean {
        color: var(--boolean-color);
      }
      .json-null {
        color: var(--null-color);
      }
      .json-summary {
        color: #888;
        font-style: italic;
        font-size: 12px;
      }

      .match-count {
        font-size: 12px;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <div class="control-panel">
      <div class="panel-section">
        <label class="btn" style="width: fit-content">
          选择文件 <input type="file" id="fileInput" accept=".json" hidden
        /></label>
        <div id="fileName" style="font-size: 12px; color: #888">未选择文件</div>
      </div>
      <div class="divider"><span>OR</span></div>
      <div class="panel-section">
        <textarea id="jsonInput" placeholder="粘贴 JSON..."></textarea>
        <button id="renderBtn" class="btn">解析文本</button>
      </div>
    </div>

    <div class="search-container">
      <span style="font-size: 14px">🔍</span>
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="输入关键字搜索，支持多关键字用 | 分割 (例如: name|1001)"
      />
      <span id="matchInfo" class="match-count"></span>
    </div>

    <div id="loading">⏳ 处理中...</div>

    <div id="viewport">
      <div id="spacer"></div>
      <div id="content"></div>
    </div>

    <script>
      const ROW_HEIGHT = 24
      const BUFFER_SIZE = 15

      let rawData = null // 完整的原始数据
      let visibleList = [] // 当前虚拟列表中展示的扁平化节点
      let searchTimer = null // 防抖计时器

      const viewport = document.getElementById('viewport')
      const spacer = document.getElementById('spacer')
      const content = document.getElementById('content')
      const loading = document.getElementById('loading')
      const searchInput = document.getElementById('searchInput')
      const matchInfo = document.getElementById('matchInfo')

      // --- 工具函数 ---
      function getType(val) {
        if (val === null) return 'null'
        if (Array.isArray(val)) return 'array'
        return typeof val
      }

      function escapeHtml(str) {
        return String(str).replace(
          /[&<>"']/g,
          (m) =>
            ({
              '&': '&amp;',
              '<': '&lt;',
              '>': '&gt;',
              '"': '&quot;',
              "'": '&#039;',
            })[m],
        )
      }

      // --- 核心逻辑：数据转换 ---
      function generateChildren(data, depth) {
        const children = []
        const isArray = Array.isArray(data)
        for (const key in data) {
          const val = data[key]
          const type = getType(val)
          const hasChildren =
            (type === 'object' || type === 'array') &&
            Object.keys(val).length > 0
          children.push({
            key: isArray ? null : key,
            value: val,
            type: type,
            depth: depth,
            isExpanded: false,
            hasChildren: hasChildren,
            summary:
              type === 'object'
                ? `{ Object, ${Object.keys(val).length} keys }`
                : type === 'array'
                  ? `[ Array, ${val.length} items ]`
                  : '',
          })
        }
        return children
      }

      // --- 搜索过滤逻辑 ---
      // 采用“保留匹配路径”策略：如果子节点匹配，父节点必须展示
      function filterData(data, regex) {
        let matchCount = 0

        function traverse(obj, depth, keyName = 'Root') {
          const type = getType(obj)
          const keyString = String(keyName)
          const valueString =
            type !== 'object' && type !== 'array' ? String(obj) : ''

          // 检查当前节点是否匹配
          const isMatch =
            regex.test(keyString) || (valueString && regex.test(valueString))
          if (isMatch) matchCount++

          if (type === 'object' || type === 'array') {
            const children = []
            const keys = Object.keys(obj)

            for (const k of keys) {
              const childResult = traverse(obj[k], depth + 1, k)
              if (childResult) children.push(childResult)
            }

            // 如果自己匹配，或者有任何子节点匹配，则保留此节点
            if (isMatch || children.length > 0) {
              return {
                key:
                  keyName === 'Root'
                    ? null
                    : Array.isArray(obj)
                      ? null
                      : keyName,
                value: obj,
                type: type,
                depth: depth,
                isExpanded: true, // 搜索模式下默认展开
                hasChildren: keys.length > 0,
                summary:
                  type === 'object'
                    ? `{ ${keys.length} keys }`
                    : `[ ${obj.length} items ]`,
                isMatched: isMatch,
                filteredChildren: children,
              }
            }
          } else {
            if (isMatch) {
              return {
                key: keyName,
                value: obj,
                type: type,
                depth: depth,
                isMatched: true,
                hasChildren: false,
              }
            }
          }
          return null
        }

        const filteredTree = traverse(data, 0)

        // 将过滤后的树拍扁供虚拟列表使用
        const flatList = []
        function flatten(node) {
          if (!node) return
          const { filteredChildren, ...rest } = node
          flatList.push(rest)
          if (filteredChildren) {
            filteredChildren.forEach(flatten)
          }
        }
        flatten(filteredTree)
        return { list: flatList, count: matchCount }
      }

      // --- 渲染逻辑 ---
      function updateScroll() {
        const scrollTop = viewport.scrollTop
        const vHeight = viewport.clientHeight || 800

        spacer.style.height = `${visibleList.length * ROW_HEIGHT}px`

        let start = Math.max(
          0,
          Math.floor(scrollTop / ROW_HEIGHT) - BUFFER_SIZE,
        )
        let end = Math.min(
          visibleList.length,
          Math.floor((scrollTop + vHeight) / ROW_HEIGHT) + BUFFER_SIZE,
        )

        content.style.transform = `translateY(${start * ROW_HEIGHT}px)`

        let html = ''
        for (let i = start; i < end; i++) {
          const node = visibleList[i]
          const iconClass = `toggle-icon ${!node.hasChildren ? 'empty' : node.isExpanded ? 'expanded' : ''}`
          const matchedClass = node.isMatched ? 'matched' : ''

          let valHtml = ''
          if (node.type === 'object' || node.type === 'array') {
            valHtml = `<span class="json-summary">${node.summary}</span>`
          } else {
            const cls = `json-${node.type}`
            const displayVal =
              node.type === 'string'
                ? `"${escapeHtml(node.value)}"`
                : node.value
            valHtml = `<span class="${cls}">${displayVal}</span>`
          }

          html += `
                <div class="tree-row ${matchedClass}" data-index="${i}" style="padding-left: ${node.depth * 20}px;">
                    <span class="${iconClass}">▶</span>
                    ${node.key ? `<span class="json-key">"${escapeHtml(node.key)}"</span>: ` : ''}
                    ${valHtml}
                </div>`
        }
        content.innerHTML = html
      }

      function handleSearch() {
        const term = searchInput.value.trim()
        if (!rawData) return

        if (!term) {
          matchInfo.textContent = ''
          // 恢复初始状态：只显示根及其第一层子节点
          initView(rawData)
          return
        }

        try {
          // 支持 | 分割关键字
          const pattern = term
            .split('|')
            .filter((s) => s.trim())
            .map((s) => s.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&'))
            .join('|')
          const regex = new RegExp(pattern, 'i')

          loading.style.display = 'block'

          // 延时执行防止 UI 冻结
          setTimeout(() => {
            const result = filterData(rawData, regex)
            visibleList = result.list
            matchInfo.textContent = `找到 ${result.count} 个匹配`
            viewport.scrollTop = 0
            updateScroll()
            loading.style.display = 'none'
          }, 10)
        } catch (e) {
          console.error('Regex error', e)
        }
      }

      function initView(data) {
        const rootType = getType(data)
        visibleList = [
          {
            key: 'Root',
            value: data,
            type: rootType,
            depth: 0,
            isExpanded: true,
            hasChildren: true,
            summary:
              rootType === 'object'
                ? `{ ${Object.keys(data).length} keys }`
                : `[ ${data.length} items ]`,
          },
        ]
        visibleList.push(...generateChildren(data, 1))
        updateScroll()
      }

      // --- 事件监听 ---
      searchInput.addEventListener('input', () => {
        clearTimeout(searchTimer)
        searchTimer = setTimeout(handleSearch, 400) // 400ms 防抖
      })

      viewport.addEventListener('scroll', () =>
        window.requestAnimationFrame(updateScroll),
      )
      window.addEventListener('resize', updateScroll)

      content.addEventListener('click', (e) => {
        // 搜索模式下点击折叠功能逻辑比较复杂（因为涉及路径完整性），
        // 这里采用简单的折叠逻辑，如果用户正在搜索，点击将照常执行折叠
        const row = e.target.closest('.tree-row')
        if (!row) return
        const index = parseInt(row.getAttribute('data-index'))
        const node = visibleList[index]
        if (!node.hasChildren) return

        if (node.isExpanded) {
          node.isExpanded = false
          let count = 0
          for (let i = index + 1; i < visibleList.length; i++) {
            if (visibleList[i].depth > node.depth) count++
            else break
          }
          visibleList.splice(index + 1, count)
        } else {
          node.isExpanded = true
          const children = generateChildren(node.value, node.depth + 1)
          visibleList.splice(index + 1, 0, ...children)
        }
        updateScroll()
      })

      // 文件上传/文本解析逻辑
      const handleRawData = (data) => {
        rawData = data
        searchInput.value = ''
        matchInfo.textContent = ''
        initView(data)
      }

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0]
        if (!file) return
        document.getElementById('fileName').textContent = file.name
        loading.style.display = 'block'
        const reader = new FileReader()
        reader.onload = (ev) => {
          try {
            handleRawData(JSON.parse(ev.target.result))
          } catch (err) {
            alert('JSON解析失败')
          }
          loading.style.display = 'none'
        }
        reader.readAsText(file)
      })

      document.getElementById('renderBtn').addEventListener('click', () => {
        const txt = document.getElementById('jsonInput').value.trim()
        if (!txt) return
        try {
          handleRawData(JSON.parse(txt))
        } catch (err) {
          alert('JSON解析失败')
        }
      })
    </script>
  </body>
</html>
